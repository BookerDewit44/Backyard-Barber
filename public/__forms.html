<!DOCTYPE html>
<html>
  <head>
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      Static form so Netlify's build-time bot detects the "contact" form.
      The real, styled form (components/ContactForm.tsx) submits to this via
      fetch. Field names here must match the ones the React form sends.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
