<!DOCTYPE html>
<html>
  <head>
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      Static form so Netlify's build-time bot detects the "contact" form.
      The real, styled forms (components/ContactForm.tsx and the in-chat quote
      form in components/ChatWidget.tsx) submit to this via fetch. Field names
      here must match what those forms send. enctype=multipart/form-data + the
      file input are required for Netlify to accept photo uploads.
    -->
    <form
      name="contact"
      data-netlify="true"
      netlify-honeypot="bot-field"
      enctype="multipart/form-data"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
      <input type="file" name="photo1" />
      <input type="file" name="photo2" />
      <input type="file" name="photo3" />
      <input type="file" name="photo4" />
      <input type="file" name="photo5" />
      <input name="bot-field" />
    </form>

    <!--
      Admin password-reset email. The /api/admin/forgot route submits this
      server-side with the one-time reset link; Netlify emails it to the
      recipient configured under Forms → password-reset → notifications
      (set that to the owner's ProtonMail). Not user-facing.
    -->
    <form name="password-reset" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="password-reset" />
      <input type="url" name="resetlink" />
      <input type="text" name="requested" />
      <input name="bot-field" />
    </form>
  </body>
</html>
